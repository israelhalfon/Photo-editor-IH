<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhotoEditor Pro</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1><i class="fas fa-camera"></i> PhotoEditor Pro</h1>
            <p>Upload and edit your photos with professional filters</p>
        </header>

        <div class="upload-section" id="uploadSection">
            <div class="upload-area" id="uploadArea">
                <div class="upload-content">
                    <i class="fas fa-cloud-upload-alt"></i>
                    <h3>Drag & Drop your photo here</h3>
                    <p>or click to browse</p>
                    <input type="file" id="fileInput" accept="image/*" hidden>
                </div>
            </div>
        </div>

        <div class="editor-section" id="editorSection" style="display: none;">
            <div class="editor-container">
                <div class="canvas-container">
                    <canvas id="canvas"></canvas>
                </div>
                
                <div class="controls-panel">
                    <div class="controls-header">
                        <h3><i class="fas fa-magic"></i> Edit Options</h3>
                        <button class="reset-btn" id="resetBtn">
                            <i class="fas fa-undo"></i> Reset
                        </button>
                    </div>
                    
                    <div class="filter-buttons">
                        <button class="filter-btn active" data-filter="original">
                            <i class="fas fa-image"></i>
                            <span>Original</span>
                        </button>
                        <button class="filter-btn" data-filter="blackwhite">
                            <i class="fas fa-adjust"></i>
                            <span>Black & White</span>
                        </button>
                        <button class="filter-btn" data-filter="chromatic">
                            <i class="fas fa-palette"></i>
                            <span>Chromatic</span>
                        </button>
                        <button class="filter-btn" data-filter="paint">
                            <i class="fas fa-paint-brush"></i>
                            <span>Paint</span>
                        </button>
                        <button class="filter-btn" data-filter="enhanced">
                            <i class="fas fa-gem"></i>
                            <span>Enhanced</span>
                        </button>
                    </div>

                    <div class="adjustment-controls">
                        <div class="control-group">
                            <label for="brightness">Brightness</label>
                            <input type="range" id="brightness" min="-100" max="100" value="0">
                        </div>
                        <div class="control-group">
                            <label for="contrast">Contrast</label>
                            <input type="range" id="contrast" min="-100" max="100" value="0">
                        </div>
                        <div class="control-group">
                            <label for="saturation">Saturation</label>
                            <input type="range" id="saturation" min="-100" max="100" value="0">
                        </div>
                    </div>

                    <div class="action-buttons">
                        <button class="btn-secondary" id="newPhotoBtn">
                            <i class="fas fa-plus"></i> New Photo
                        </button>
                        <button class="btn-primary" id="downloadBtn">
                            <i class="fas fa-download"></i> Download
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
